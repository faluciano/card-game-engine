name: Build APK

on:
  workflow_dispatch: {}
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.19"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - run: bun install

      - name: Build client
        run: bun run build:client

      - name: Bundle client for host
        run: bun run bundle:client

      - name: Generate native project
        run: bunx expo prebuild --clean --platform android
        working-directory: packages/host

      - name: Optimize Gradle for CI
        run: |
          PROPS=packages/host/android/gradle.properties
          {
            echo ""
            echo "org.gradle.java.home=$JAVA_HOME"
            echo "org.gradle.daemon=false"
            echo "org.gradle.caching=true"
            echo "org.gradle.configureondemand=true"
            echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError"
            echo "kotlin.incremental=false"
            echo "kotlin.compiler.execution.strategy=in-process"
          } >> "$PROPS"

      - name: Build APK
        run: ./gradlew assembleRelease -PreactNativeArchitectures=arm64-v8a
        working-directory: packages/host/android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: card-game-engine-release
          path: packages/host/android/app/build/outputs/apk/release/*.apk

      - name: Upload APK to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=$(find packages/host/android/app/build/outputs/apk/release -name "*.apk" | head -1)
          gh release upload "${{ github.event.release.tag_name }}" "$APK" --clobber
