name: Build APK

on:
  workflow_dispatch: {}
  release:
    types: [published]
  workflow_call:
    inputs:
      tag:
        description: "Release tag to build and upload the APK to (e.g. v1.8.5)."
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.19"


      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - run: bun install --frozen-lockfile

      - name: Derive version from release tag
        if: steps.tag.outputs.tag != ''
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "VERSION_NAME=$VERSION" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          # Inject version into app.json so expo prebuild generates correct build.gradle
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('packages/host/app.json', 'utf8'));
            app.expo.version = '${VERSION}';
            app.expo.android.versionCode = ${VERSION_CODE};
            fs.writeFileSync('packages/host/app.json', JSON.stringify(app, null, 2) + '\n');
          "

      - name: Generate native project
        run: bunx expo prebuild --platform android
        working-directory: packages/host

      - name: Optimize Gradle for CI
        run: |
          PROPS=packages/host/android/gradle.properties
          {
            echo ""
            echo "org.gradle.java.home=$JAVA_HOME"
            echo "org.gradle.daemon=false"
            echo "org.gradle.caching=true"
            echo "org.gradle.parallel=true"
            echo "org.gradle.workers.max=4"
            echo "org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError"
            echo "kotlin.incremental=false"
          } >> "$PROPS"

      - name: Build client
        run: bun run build:client

      - name: Bundle client for host
        run: bun run bundle:client

      # React Native's CMake (ReactNative-application.cmake) auto-detects ccache
      # via find_program() and wires it in as the compile/link launcher, so no
      # build.gradle changes are needed — this job only has to make ccache
      # available, persist its cache, and keep it correct across CI runs.
      - name: Set up ccache
        run: |
          mkdir -p "$HOME/.cache/ccache"
          if ! command -v ccache >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y ccache \
              || echo "ccache install failed; native build will run without caching"
          fi
          if command -v ccache >/dev/null 2>&1; then
            echo "CCACHE_DIR=$HOME/.cache/ccache" >> "$GITHUB_ENV"
            # CI re-downloads the NDK/toolchain every run, so the default
            # mtime-based compiler check always misses. Hash the compiler
            # contents instead to get real cross-run hits without ever serving
            # a stale object.
            echo "CCACHE_COMPILERCHECK=content" >> "$GITHUB_ENV"
            echo "CCACHE_MAXSIZE=2G" >> "$GITHUB_ENV"
            ccache --version | head -1
          fi

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-release-apk-${{ runner.os }}-${{ hashFiles('bun.lock') }}-${{ github.sha }}
          restore-keys: |
            ccache-release-apk-${{ runner.os }}-${{ hashFiles('bun.lock') }}-
            ccache-release-apk-${{ runner.os }}-

      - name: Reset ccache stats
        run: ccache --zero-stats || true

      - name: Build APK
        run: ./gradlew assembleRelease
        working-directory: packages/host/android

      - name: Report ccache statistics
        if: always()
        run: |
          if command -v ccache >/dev/null 2>&1; then
            {
              echo "## ccache statistics"
              echo ""
              echo '```'
              ccache --show-stats --verbose 2>/dev/null || ccache -s
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Analyze APK
        run: |
          APK=$(find packages/host/android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "## APK Analysis" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          FILE_SIZE=$(stat -c%s "$APK" 2>/dev/null || stat -f%z "$APK")
          FILE_SIZE_MB=$(echo "scale=2; $FILE_SIZE / 1048576" | bc)
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **APK file size** | ${FILE_SIZE_MB} MB |" >> "$GITHUB_STEP_SUMMARY"

          if command -v $ANDROID_HOME/cmdline-tools/latest/bin/apkanalyzer &>/dev/null; then
            DOWNLOAD_SIZE=$($ANDROID_HOME/cmdline-tools/latest/bin/apkanalyzer apk download-size "$APK")
            DOWNLOAD_MB=$(echo "scale=2; $DOWNLOAD_SIZE / 1048576" | bc)
            DEX_REFS=$($ANDROID_HOME/cmdline-tools/latest/bin/apkanalyzer dex references "$APK" | tail -1)
            echo "| **Download size** | ${DOWNLOAD_MB} MB |" >> "$GITHUB_STEP_SUMMARY"
            echo "| **DEX method refs** | ${DEX_REFS} |" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "APK: \`$(basename $APK)\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: card-game-engine-release
          path: packages/host/android/app/build/outputs/apk/release/*.apk

      - name: Upload APK to release
        if: steps.tag.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          APK=$(find packages/host/android/app/build/outputs/apk/release -name "*.apk" | head -1)
          gh release upload "$TAG" "$APK" --clobber
          FILE_SIZE=$(stat -c%s "$APK" 2>/dev/null || stat -f%z "$APK")
          FILE_SIZE_MB=$(echo "scale=2; $FILE_SIZE / 1048576" | bc)
          CURRENT_BODY=$(gh release view "$TAG" --json body -q .body)
          printf -v NOTES '%s\n\n---\n**APK size:** %s MB' "$CURRENT_BODY" "$FILE_SIZE_MB"
          gh release edit "$TAG" --notes "$NOTES"
