name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.19"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  build:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.19"
      - run: bun install --frozen-lockfile
      - run: bun run build:client

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.19"
      - run: bun install --frozen-lockfile
      - name: Test shared
        run: bunx vitest run
        working-directory: packages/shared
      - name: Test schema
        run: bunx vitest run
        working-directory: packages/schema
      - name: Test host
        run: bunx vitest run
        working-directory: packages/host

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.19"
      - run: bun install --frozen-lockfile
      - run: bun run validate
